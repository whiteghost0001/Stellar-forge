name: E2E Tests

on:
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E (testnet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_NETWORK: testnet
      VITE_FACTORY_CONTRACT_ID: ${{ secrets.E2E_FACTORY_CONTRACT_ID }}
      VITE_IPFS_API_KEY: ${{ secrets.E2E_IPFS_API_KEY }}
      VITE_IPFS_API_SECRET: ${{ secrets.E2E_IPFS_API_SECRET }}
      E2E_TOKEN_ADDRESS: ${{ secrets.E2E_TOKEN_ADDRESS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StellarForge - Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0f0f1a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .container {
        text-align: center;
        max-width: 420px;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        background: linear-gradient(135deg, #a78bfa, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      .btn:hover { opacity: 0.85; }

      .status {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">⭐</div>
      <h1>You're Offline</h1>
      <p>
        StellarForge needs an internet connection to interact with the Stellar
        blockchain. Please check your connection and try again.
      </p>
      <button class="btn" onclick="window.location.reload()">Try Again</button>
      <p class="status" id="status"></p>
    </div>

    <script>
      window.addEventListener('online', () => {
        document.getElementById('status').textContent = 'Connection restored. Redirecting...';
        setTimeout(() => window.location.replace('/'), 1000);
      });
    </script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#7c3aed" opacity="0.15"/>
  <circle cx="150" cy="520" r="140" fill="#a78bfa" opacity="0.10"/>

  <!-- Accent bar -->
  <rect x="80" y="260" width="6" height="110" rx="3" fill="url(#accent)"/>

  <!-- Logo star icon -->
  <text x="80" y="210" font-family="sans-serif" font-size="72" fill="#a78bfa">✦</text>

  <!-- Title -->
  <text x="100" y="310" font-family="sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-1">StellarForge</text>

  <!-- Subtitle -->
  <text x="100" y="375" font-family="sans-serif" font-size="32" fill="#c4b5fd">Stellar Token Deployer</text>

  <!-- Description -->
  <text x="100" y="430" font-family="sans-serif" font-size="26" fill="#94a3b8">Deploy custom tokens on the Stellar blockchain</text>
  <text x="100" y="465" font-family="sans-serif" font-size="26" fill="#94a3b8">— no code required.</text>

  <!-- Bottom accent line -->
  <rect x="80" y="540" width="1040" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Footer tags -->
  <text x="80" y="580" font-family="sans-serif" font-size="20" fill="#7c3aed">#Stellar</text>
  <text x="200" y="580" font-family="sans-serif" font-size="20" fill="#7c3aed">#Soroban</text>
  <text x="330" y="580" font-family="sans-serif" font-size="20" fill="#7c3aed">#Web3</text>
  <text x="430" y="580" font-family="sans-serif" font-size="20" fill="#7c3aed">#DeFi</text>
</svg>
